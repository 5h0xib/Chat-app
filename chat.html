<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/auth.js" defer></script>
    <script src="js/friends.js" defer></script>
    <script src="js/chat.js" defer></script>
    <script src="js/notifications.js" defer></script>
</head>

<body class="app-bg">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar" id="myAvatar"></div>
                    <span id="myName">Loading...</span>
                </div>
                <button id="logoutBtn" class="icon-btn" title="Logout">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </header>

            <div class="search-container">
                <div class="search-bar">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search users by email or username">
                </div>
                <!-- Profile Settings Button -->
                <button id="profileSettingsBtn" class="action-btn"
                    style="width: 100%; margin-top: 10px; background-color: #21262d; border-color: var(--wa-border); color: var(--wa-text-main);">
                    Edit Profile
                </button>
                <div id="searchResults" class="search-results" style="display: none;"></div>
            </div>

            <!-- Friend Requests Panel -->
            <div id="friendRequestsPanel" class="requests-panel" style="display: none;">
                <div class="panel-title">Friend Requests</div>
                <ul id="requestsList" class="requests-list"></ul>
            </div>

            <!-- Friends List -->
            <div class="friends-list" id="friendsList">
                <div class="loading-text">Loading friends...</div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area" id="chatArea">
            <!-- Empty state -->
            <div id="emptyChat" class="empty-state">
                <div class="empty-state-content">
                    <svg viewBox="0 0 24 24" width="100" height="100" stroke="var(--wa-text-light)" stroke-width="1"
                        fill="none">
                        <path
                            d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                        </path>
                    </svg>
                    <h1>TheComApp</h1>
                    <p>Send and receive messages without keeping your phone online.</p>
                </div>
            </div>

            <!-- Active chat UI -->
            <div id="activeChat" class="active-chat" style="display: none;">
                <header class="chat-header">
                    <div class="chat-user-info">
                        <button class="icon-btn back-btn" id="backBtn" style="display: none;">
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                                fill="none">
                                <line x1="19" y1="12" x2="5" y2="12"></line>
                                <polyline points="12 19 5 12 12 5"></polyline>
                            </svg>
                        </button>
                        <div class="avatar" id="currentChatAvatar"></div>
                        <span id="currentChatName">Friend Name</span>
                    </div>
                </header>

                <div class="messages-container" id="messagesContainer">
                    <!-- Messages will be injected here -->
                </div>

                <footer class="chat-footer">
                    <form id="messageForm" class="message-form">
                        <!-- Attachment Button -->
                        <label for="imageAttachmentInput" class="icon-btn"
                            style="cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 10px;">
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                                fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                                </path>
                            </svg>
                        </label>
                        <input type="file" id="imageAttachmentInput" accept="image/*" style="display: none;">

                        <!-- Image Preview Container (Hidden by default) -->
                        <div id="imagePreviewContainer"
                            style="display: none; align-items: center; background: #0d1117; border: 1px solid var(--wa-border); border-radius: 6px; padding: 4px; gap: 8px;">
                            <img id="imagePreview" src="" alt="Preview"
                                style="height: 40px; width: 40px; object-fit: cover; border-radius: 4px;">
                            <button type="button" id="removeImageBtn" class="icon-btn"
                                style="padding: 4px;">&times;</button>
                        </div>

                        <input type="text" id="messageInput" placeholder="Type a message" autocomplete="off">
                        <button type="submit" class="send-btn" id="sendBtn">
                            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                                fill="none">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </form>
                </footer>
            </div>
        </main>

        <!-- Profile Settings Modal -->
        <div id="profileModal" class="modal-overlay" style="display: none;">
            <div class="modal-content auth-container">
                <div class="modal-header"
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="color: var(--wa-text-main); margin: 0;">Edit Profile</h2>
                    <button id="closeProfileBtn" class="icon-btn">&times;</button>
                </div>
                <form id="profileForm" class="auth-form">
                    <div id="profileError" class="error-message" style="display: none;"></div>
                    <div id="profileSuccess" class="success-message" style="display: none;"></div>

                    <div class="form-group" style="text-align: center;">
                        <div class="avatar" id="modalAvatarPreview"
                            style="width: 100px; height: 100px; font-size: 36px; margin: 0 auto 10px;"></div>
                        <label for="avatarInput" class="action-btn"
                            style="display: inline-block; cursor: pointer; background-color: #21262d; border-color: var(--wa-border); color: var(--wa-text-main);">
                            Change Picture (1:1 ratio)
                        </label>
                        <input type="file" id="avatarInput" accept="image/png, image/jpeg, image/webp"
                            style="display: none;">
                    </div>

                    <div class="form-group">
                        <label for="editUsername">Username</label>
                        <input type="text" id="editUsername" required>
                    </div>

                    <button type="submit" class="btn btn-primary" id="saveProfileBtn">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>

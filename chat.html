<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/auth.js" defer></script>
    <script src="js/friends.js" defer></script>
    <script src="js/chat.js" defer></script>
    <script src="js/notifications.js" defer></script>
</head>

<body class="app-bg">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar" id="myAvatar"></div>
                    <span id="myName">Loading...</span>
                </div>
                <button id="logoutBtn" class="icon-btn" title="Logout">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </header>

            <div class="search-container">
                <div class="search-bar">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search users by email or username">
                </div>
                <div id="searchResults" class="search-results" style="display: none;"></div>
            </div>

            <!-- Friend Requests Panel -->
            <div id="friendRequestsPanel" class="requests-panel" style="display: none;">
                <div class="panel-title">Friend Requests</div>
                <ul id="requestsList" class="requests-list"></ul>
            </div>

            <!-- Friends List -->
            <div class="friends-list" id="friendsList">
                <div class="loading-text">Loading friends...</div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area" id="chatArea">
            <!-- Empty state -->
            <div id="emptyChat" class="empty-state">
                <div class="empty-state-content">
                    <svg viewBox="0 0 24 24" width="100" height="100" stroke="var(--wa-text-light)" stroke-width="1"
                        fill="none">
                        <path
                            d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                        </path>
                    </svg>
                    <h1>WhatsApp Web Clone</h1>
                    <p>Send and receive messages without keeping your phone online.</p>
                </div>
            </div>

            <!-- Active chat UI -->
            <div id="activeChat" class="active-chat" style="display: none;">
                <header class="chat-header">
                    <div class="chat-user-info">
                        <button class="icon-btn back-btn" id="backBtn" style="display: none;">
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                                fill="none">
                                <line x1="19" y1="12" x2="5" y2="12"></line>
                                <polyline points="12 19 5 12 12 5"></polyline>
                            </svg>
                        </button>
                        <div class="avatar" id="currentChatAvatar"></div>
                        <span id="currentChatName">Friend Name</span>
                    </div>
                </header>

                <div class="messages-container" id="messagesContainer">
                    <!-- Messages will be injected here -->
                </div>

                <footer class="chat-footer">
                    <form id="messageForm" class="message-form">
                        <input type="text" id="messageInput" placeholder="Type a message" autocomplete="off" required>
                        <button type="submit" class="send-btn" id="sendBtn">
                            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                                fill="none">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </form>
                </footer>
            </div>
        </main>
    </div>
</body>

</html>
